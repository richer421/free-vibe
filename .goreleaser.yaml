version: 2

project_name: freevibe

builds:
  - id: freevibe
    main: ./cmd/freevibe
    binary: freevibe
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X free-vibe-coding/internal/freevibe/cmd.Version={{ .Version }} -X free-vibe-coding/internal/freevibe/cmd.BuildTime={{ .Date }}

archives:
  - id: freevibe
    ids:
      - freevibe
    formats:
      - tar.gz
    name_template: "freevibe_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
