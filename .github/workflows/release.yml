name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Install Script Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tmp_install="$(mktemp)"
          sed "s/FREEVIBE_DEFAULT_VERSION:-latest/FREEVIBE_DEFAULT_VERSION:-${GITHUB_REF_NAME}/g" scripts/install.sh > "${tmp_install}"
          chmod +x "${tmp_install}"
          gh release upload "${GITHUB_REF_NAME}" "${tmp_install}#install.sh" --clobber
